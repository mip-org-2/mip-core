name: Build and Upload Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip-package-manager
        uses: actions/checkout@v4
        with:
          repository: mip-org-2/mip-package-manager
          path: mip-package-manager

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true

      - name: Install Python dependencies
        run: |
          pip install requests pyyaml

      - name: Prepare packages
        env:
          BUILD_ARCHITECTURE: linux_x86_64
        run: |
          python scripts/prepare_packages.py

      - name: Bundle packages with mip
        uses: matlab-actions/run-command@v2
        with:
          command: "addpath('mip-package-manager'); addpath('scripts'); bundle_packages"

      - name: Upload packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/upload_packages.py

  assemble-index:
    runs-on: ubuntu-latest
    needs: [build-linux]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Assemble package index
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/assemble_index.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/gh-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: assemble-index
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
